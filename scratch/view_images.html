<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Branding Mockups</title>
  <style>
    body { font-family: sans-serif; background: #fafafa; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .card { background: white; border: 1px solid #ccc; padding: 10px; text-align: center; border-radius: 8px; }
    img { max-width: 100%; height: auto; border-radius: 4px; max-height: 400px; object-fit: contain; }
    h3 { margin: 10px 0 5px; }
  </style>
</head>
<body>
  <h1>Maternar App Branding Mockups</h1>
  <div class="grid">
    <div class="card">
      <h3>PHONE.png</h3>
      <img src="../src/assets/brand/mockup/PHONE.png" alt="PHONE">
    </div>
    <div class="card">
      <h3>PHONE-1.png</h3>
      <img src="../src/assets/brand/mockup/PHONE-1.png" alt="PHONE-1">
    </div>
    <div class="card">
      <h3>PHONE-2.png</h3>
      <img src="../src/assets/brand/mockup/PHONE-2.png" alt="PHONE-2">
    </div>
    <div class="card">
      <h3>PHONE-3.png</h3>
      <img src="../src/assets/brand/mockup/PHONE-3.png" alt="PHONE-3">
    </div>
    <div class="card">
      <h3>PHONE-4.png</h3>
      <img src="../src/assets/brand/mockup/PHONE-4.png" alt="PHONE-4">
    </div>
    <div class="card">
      <h3>PHONE-5.png</h3>
      <img src="../src/assets/brand/mockup/PHONE-5.png" alt="PHONE-5">
    </div>
    <div class="card">
      <h3>PHONE-6.png</h3>
      <img src="../src/assets/brand/mockup/PHONE-6.png" alt="PHONE-6">
    </div>
    <div class="card">
      <h3>PHONE-7.png</h3>
      <img src="../src/assets/brand/mockup/PHONE-7.png" alt="PHONE-7">
    </div>
    <div class="card">
      <h3>Frame.png</h3>
      <img src="../src/assets/brand/mockup/Frame.png" alt="Frame">
    </div>
    <div class="card">
      <h3>logo-horizontal.svg</h3>
      <img src="../src/assets/brand/logo-horizontal.svg" alt="logo-horizontal" style="background: #113E36; padding: 10px;">
    </div>
    <div class="card">
      <h3>logo-icon.svg</h3>
      <img src="../src/assets/brand/logo-icon.svg" alt="logo-icon">

    <div class="card">

      <img src="../src/assets/brand/decor1.svg" alt="decor1">
    </div>
  </div>
</body>
</html>
